<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>廃屋脱出</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    width: 100%; height: 100%;
    background: #000;
    font-family: 'Courier New', monospace;
    overflow: hidden;
    user-select: none;
  }
  #app {
    width: 100%; height: 100vh;
    display: flex; align-items: center; justify-content: center;
    background: #000;
  }
  #gameWrap {
    position: relative;
    width: 100%; height: 100%;
    max-width: 480px;
    max-height: 900px;
    margin: 0 auto;
    background: #000;
    overflow: hidden;
    box-shadow: 0 0 60px rgba(80,0,0,0.4);
  }

  /* ── 共通画面 ── */
  .screen {
    position: absolute; inset: 0;
    display: none;
    flex-direction: column;
    align-items: center; justify-content: center;
    background: #000;
  }
  .screen.active { display: flex; }

  /* ── タイトル画面 ── */
  #titleScreen {
    background-size: cover;
    background-position: center;
  }
  #titleScreen img.bg {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    filter: brightness(0.65);
  }
  #titleScreen .overlay {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse 80% 60% at 50% 50%, transparent 30%, rgba(0,0,0,0.75) 100%);
  }
  #titleScreen .content {
    position: relative; z-index: 2;
    text-align: center;
    color: #c8a060;
  }
  #titleScreen h1 {
    font-size: 1.6rem;
    letter-spacing: 0.3em;
    margin-bottom: 8px;
    text-shadow: 0 0 20px rgba(180,30,30,0.6);
    animation: titleFlicker 4s infinite;
  }
  #titleScreen .sub {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    color: #6a5030;
    margin-bottom: 60px;
  }
  @keyframes titleFlicker {
    0%, 90%, 100% { opacity: 1; }
    91% { opacity: 0.3; }
    92% { opacity: 1; }
    95% { opacity: 0.1; }
    96% { opacity: 1; }
  }
  #startBtn {
    background: rgba(10,5,5,0.7);
    border: 1px solid #8b2020;
    color: #d0a050;
    padding: 14px 50px;
    font-family: 'Courier New', monospace;
    font-size: 0.9rem;
    letter-spacing: 0.3em;
    cursor: pointer;
    transition: all 0.25s;
    animation: btnPulse 2.5s infinite;
  }
  #startBtn:active {
    background: rgba(40,10,10,0.9);
    box-shadow: 0 0 25px rgba(180,30,30,0.5);
  }
  @keyframes btnPulse {
    0%, 100% { box-shadow: 0 0 8px rgba(180,30,30,0.3); }
    50% { box-shadow: 0 0 18px rgba(180,30,30,0.55); }
  }

  /* ── ゲーム画面 ── */
  #gameScreen {
    position: absolute; inset: 0;
  }
  #roomImg {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: contain;
    background: #050302;
    transition: opacity 0.3s ease;
    opacity: 1;
  }
  #roomImg.fading { opacity: 0.3; }

  /* トップバー */
  #topBar {
    position: absolute; top: 0; left: 0; right: 0;
    z-index: 30;
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 14px;
    background: linear-gradient(180deg, rgba(0,0,0,0.8) 0%, transparent 100%);
  }
  #lifeIndicator {
    display: flex; align-items: center; gap: 5px;
    font-size: 0.7rem; color: #b89040;
  }
  .lifeDot {
    width: 9px; height: 9px; border-radius: 50%;
    background: #7a1010; box-shadow: 0 0 5px #7a1010;
  }
  #topBtns { display: flex; gap: 6px; }
  .topBtn {
    background: rgba(0,0,0,0.7);
    border: 1px solid rgba(70,55,25,0.55);
    color: rgba(170,140,80,0.8);
    padding: 5px 11px;
    font-size: 0.6rem;
    font-family: monospace;
    letter-spacing: 0.12em;
    cursor: pointer;
  }
  .topBtn.on { border-color: rgba(160,50,50,0.7); color: #c8a040; }

  /* 部屋名ラベル */
  #roomLabel {
    position: absolute; bottom: 0; left: 0; right: 0;
    z-index: 15;
    padding: 10px 14px 8px;
    font-size: 0.6rem;
    color: rgba(180,150,100,0.75);
    letter-spacing: 0.25em;
    text-transform: uppercase;
    background: linear-gradient(0deg, rgba(0,0,0,0.7) 0%, transparent 100%);
    pointer-events: none;
  }

  /* ホットスポット */
  .hotspot {
    position: absolute;
    cursor: pointer;
  }
  .hotspot .hint {
    position: absolute;
    bottom: calc(100% + 4px); left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.85);
    border: 1px solid rgba(90,70,25,0.7);
    color: rgba(210,175,90,0.95);
    font-size: 0.58rem;
    padding: 3px 8px;
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.15s;
  }
  .hotspot:active .hint,
  .hotspot.show-hint .hint { opacity: 1; }
  .hotspot.found { pointer-events: none; }

  /* 移動矢印 */
  .navArrow {
    position: absolute;
    width: 56px; height: 56px;
    border-radius: 50%;
    background: rgba(0,0,0,0.55);
    border: 1px solid rgba(180,140,80,0.4);
    display: flex; align-items: center; justify-content: center;
    color: rgba(210,180,120,0.85);
    font-size: 1.4rem;
    cursor: pointer;
    z-index: 25;
    transition: background 0.15s;
  }
  .navArrow:active { background: rgba(120,40,40,0.5); }

  /* ── テキストボックス（下部） ── */
  #textBox {
    position: absolute; bottom: 0; left: 0; right: 0;
    z-index: 35;
    background: linear-gradient(0deg, rgba(5,2,2,0.97) 60%, rgba(5,2,2,0.6) 100%);
    border-top: 1px solid #1c1208;
    padding: 12px 16px;
    min-height: 60px;
    max-height: 35%;
    overflow-y: auto;
    font-size: 0.78rem;
    line-height: 1.85;
    color: #a89060;
    white-space: pre-line;
    transition: transform 0.3s ease, opacity 0.3s ease;
  }
  #textBox.hidden {
    transform: translateY(100%);
    opacity: 0;
    pointer-events: none;
  }
  #textBox.event { color: #c8a860; }

  /* ── アイテムバー ── */
  #itemBar {
    position: absolute; top: 54px; right: 10px;
    z-index: 30;
    display: flex; flex-direction: column; gap: 6px;
  }
  .itemSlot {
    width: 46px; height: 46px;
    border: 2px solid #2c1c08;
    background: linear-gradient(145deg,#100804,#080402);
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
    position: relative;
  }
  .itemSlot img { width: 80%; height: 80%; object-fit: contain; }
  .itemSlot .label {
    position: absolute; bottom: 1px; left: 0; right: 0;
    text-align: center;
    font-size: 0.42rem;
    color: #c8a040;
    background: rgba(0,0,0,0.6);
    line-height: 1.3;
  }

  /* ── パズル入力 ── */
  #puzzleBox {
    position: absolute; bottom: 0; left: 0; right: 0;
    z-index: 40;
    background: rgba(5,2,2,0.97);
    border-top: 1px solid #2c1010;
    padding: 16px;
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }
  #puzzleBox.active { display: flex; }
  #puzzleBox .ptitle {
    font-size: 0.7rem; color: #c0a040; letter-spacing: 0.15em;
  }
  #puzzleBox .pinputs {
    display: flex; gap: 8px;
  }
  .pdigit {
    width: 40px; height: 50px;
    background: #0a0604;
    border: 1px solid #3c2010;
    color: #e0d0a0;
    font-size: 1.4rem;
    text-align: center;
    font-family: monospace;
    outline: none;
  }
  .pdigit:focus { border-color: #8b1a1a; }
  #puzzleBox .pbtns { display: flex; gap: 10px; }
  .pbtn {
    background: #0e0604;
    border: 1px solid #601818;
    color: #b04040;
    padding: 8px 20px;
    font-family: monospace;
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    cursor: pointer;
  }
  .pbtn.cancel { border-color: #3c2c14; color: #8a7050; }
  #puzzleErr {
    font-size: 0.62rem; color: #b03030;
    min-height: 14px;
  }

  /* ── ジャンプスケア ── */
  #scareOverlay {
    position: absolute; inset: 0;
    z-index: 200;
    display: none;
    background: #000;
  }
  #scareOverlay.active {
    display: block;
  }
  #scareOverlay img {
    width: 100%; height: 100%;
    object-fit: contain;
    background: #000;
    animation: scareShake 0.5s ease;
  }
  @keyframes scareShake {
    0%, 100% { transform: translate(0,0); }
    15% { transform: translate(-10px, 8px) rotate(-2deg); }
    30% { transform: translate(10px, -8px) rotate(2deg); }
    50% { transform: translate(-6px, 4px); }
    70% { transform: translate(6px, -4px); }
  }

  /* ── アイテム入手ポップアップ ── */
  #itemPopup {
    position: absolute; inset: 0;
    z-index: 150;
    display: none;
    align-items: center; justify-content: center;
    background: rgba(0,0,0,0.6);
  }
  #itemPopup.active { display: flex; }
  #itemPopup .card {
    background: linear-gradient(145deg,#1e1a12,#141008);
    border: 2px solid #5a4820;
    box-shadow: 0 0 40px rgba(120,90,30,0.5), inset 0 0 20px rgba(0,0,0,0.5);
    padding: 26px 36px;
    text-align: center;
    min-width: 200px;
    animation: itemPopIn 0.35s cubic-bezier(0.34,1.56,0.64,1) forwards;
    position: relative;
  }
  #itemPopup .card img {
    width: 80px; height: 80px;
    object-fit: contain;
    margin-bottom: 10px;
    filter: drop-shadow(0 0 12px rgba(200,168,64,0.4));
  }
  #itemPopup .label {
    font-size: 0.58rem; color: #8a7030;
    letter-spacing: 0.25em; text-transform: uppercase;
    margin-bottom: 6px;
  }
  #itemPopup .name {
    font-size: 0.9rem; color: #c8a840;
    letter-spacing: 0.08em; font-weight: bold;
    text-shadow: 0 0 10px rgba(200,168,64,0.4);
  }
  @keyframes itemPopIn {
    0% { opacity: 0; transform: scale(0.6) translateY(20px); }
    100% { opacity: 1; transform: scale(1) translateY(0); }
  }
  @keyframes itemPopOut {
    0% { opacity: 1; transform: scale(1); }
    100% { opacity: 0; transform: scale(0.85) translateY(-10px); }
  }
  #itemPopup .card.out { animation: itemPopOut 0.35s ease forwards; }

  /* ── MAPパネル ── */
  #mapPanel {
    position: absolute; inset: 0;
    z-index: 60;
    display: none;
    align-items: center; justify-content: center;
    background: rgba(0,0,0,0.93);
  }
  #mapPanel.active { display: flex; }
  #mapPanel .box {
    background: #080604;
    border: 1px solid #1c1408;
    padding: 22px 28px;
    width: 78%; max-width: 280px;
  }
  #mapPanel .mtitle {
    font-size: 0.68rem; color: #483218;
    letter-spacing: 0.2em; text-transform: uppercase;
    margin-bottom: 14px;
  }
  .maprow {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 0; border-bottom: 1px solid #100c06;
    font-size: 0.7rem;
  }
  .mapdot {
    width: 9px; height: 9px; border-radius: 50%;
    border: 1px solid #281808; flex-shrink: 0;
  }
  .mapdot.cur { background: #781818; border-color: #781818; }
  .mapdot.vis { background: #281808; border-color: #382010; }
  #mapPanel .mclose {
    margin-top: 12px; font-size: 0.55rem; color: #382810;
    text-align: center; letter-spacing: 0.1em;
  }

  /* ── エンディング ── */
  #endScreen {
    position: absolute; inset: 0;
    z-index: 300;
    display: none;
    flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center;
    background: #000;
    padding: 36px 28px;
  }
  #endScreen.active {
    display: flex;
    animation: fadeIn 1.4s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  #endScreen .etitle {
    font-size: 1.7rem; color: #b89040;
    letter-spacing: 0.1em;
    margin-bottom: 18px;
    text-shadow: 0 0 30px rgba(184,144,64,0.6);
    animation: titleFlicker 4.5s infinite;
  }
  #endScreen .edesc {
    font-size: 0.72rem; color: #584528;
    line-height: 2; margin-bottom: 28px;
    max-width: 280px;
  }
  #endScreen .ebtn {
    background: #0e0804; border: 1px solid #382010;
    color: #987840; padding: 10px 28px;
    font-family: monospace; font-size: 0.76rem;
    letter-spacing: 0.1em; cursor: pointer;
  }
</style>
</head>
<body>
<div id="app">
  <div id="gameWrap">

    <!-- タイトル画面 -->
    <div id="titleScreen" class="screen active">
      <img class="bg" src="images/01.png" alt="title">
      <div class="overlay"></div>
      <div class="content">
        <h1>廃 屋 脱 出</h1>
        <div class="sub">ABANDONED HOUSE ESCAPE</div>
        <button id="startBtn">START</button>
      </div>
    </div>

    <!-- ゲーム画面 -->
    <div id="gameScreen" class="screen">
      <img id="roomImg" src="images/02.png" alt="room">

      <div id="topBar">
        <div id="lifeIndicator">
          <div class="lifeDot"></div><div class="lifeDot"></div>
          <span style="margin-left:3px;">×2</span>
        </div>
        <div id="topBtns">
          <button class="topBtn" id="mapBtn">MAP</button>
          <button class="topBtn" id="bagBtn">🎒</button>
        </div>
      </div>

      <div id="hotspotLayer"></div>
      <div id="navLayer"></div>

      <div id="itemBar"></div>

      <div id="roomLabel"></div>

      <div id="textBox"></div>

      <div id="puzzleBox">
        <div class="ptitle">封印の数字を入力せよ</div>
        <div class="pinputs">
          <input class="pdigit" maxlength="1" inputmode="numeric" pattern="[0-9]">
          <input class="pdigit" maxlength="1" inputmode="numeric" pattern="[0-9]">
          <input class="pdigit" maxlength="1" inputmode="numeric" pattern="[0-9]">
          <input class="pdigit" maxlength="1" inputmode="numeric" pattern="[0-9]">
        </div>
        <div id="puzzleErr"></div>
        <div class="pbtns">
          <button class="pbtn cancel" id="puzzleCancel">閉じる</button>
          <button class="pbtn" id="puzzleSubmit">解錠</button>
        </div>
      </div>

      <!-- ジャンプスケア -->
      <div id="scareOverlay"><img id="scareImg" src="" alt=""></div>

      <!-- アイテム入手ポップアップ -->
      <div id="itemPopup">
        <div class="card">
          <img id="popupImg" src="" alt="">
          <div class="label">アイテム入手</div>
          <div class="name" id="popupName"></div>
        </div>
      </div>

      <!-- MAP -->
      <div id="mapPanel">
        <div class="box">
          <div class="mtitle">FLOOR MAP</div>
          <div id="mapList"></div>
          <div class="mclose">タップで閉じる</div>
        </div>
      </div>
    </div>

    <!-- エンディング -->
    <div id="endScreen" class="screen">
      <div class="etitle" id="endTitle">— 脱出 —</div>
      <div class="edesc" id="endDesc"></div>
      <button class="ebtn" id="restartBtn">▶ もう一度</button>
    </div>

  </div>
</div>

<script>
// ══════════════════════════════════════════════
//  ゲームデータ
// ══════════════════════════════════════════════
const ROOMS = {
  entrance: {
    name: "玄関",
    img: "images/02.png",
    text: "重い扉に手をかける。\n……開かない。閉じ込められたのか？",
    hotspots: [
      { id: "door", top:"30%", left:"30%", width:"40%", height:"55%",
        label: "扉",
        onTap: "doorAction" },
    ],
    nav: [
      { dir: "right", target: "living", top:"42%", left:"82%" },
    ],
  },
  living: {
    name: "居間",
    img: "images/03.png",
    text: "家具が朽ち、埃が積もった居間。空気が重い。",
    hotspots: [
      { id: "tansu", top:"10%", left:"55%", width:"35%", height:"60%",
        label: "タンス",
        scare: "images/09.png" },
    ],
    nav: [
      { dir: "left", target: "entrance", top:"42%", left:"6%" },
      { dir: "right", target: "bedroom", top:"42%", left:"82%" },
      { dir: "up", target: "storage", top:"15%", left:"45%" },
    ],
  },
  bedroom: {
    name: "寝室",
    img: "images/04.png",
    text: "古びた寝室。誰かが寝ていたような跡が残る。",
    hotspots: [
      { id: "shelf", top:"15%", left:"5%", width:"30%", height:"40%",
        label: "枕元の棚",
        item: { id:"note", name:"メモ用紙", img:"images/07.png",
                text:"棚の上に古いメモ用紙が置かれていた。\n何かの数字が書かれている……" } },
    ],
    nav: [
      { dir: "left", target: "living", top:"42%", left:"6%" },
      { dir: "right", target: "kitchen", top:"42%", left:"82%" },
    ],
  },
  kitchen: {
    name: "キッチン",
    img: "images/05.png",
    text: "錆びた調理器具が並ぶ。換気扇の音が時々鳴る。",
    hotspots: [
      { id: "window", top:"8%", left:"55%", width:"38%", height:"45%",
        label: "窓",
        scare: "images/11.png" },
    ],
    nav: [
      { dir: "left", target: "bedroom", top:"42%", left:"6%" },
    ],
  },
  storage: {
    name: "物置部屋",
    img: "images/06.png",
    text: "雑多なものが詰め込まれた物置。\n右下に鍵のかかった箱がある。",
    hotspots: [
      { id: "box", top:"55%", left:"55%", width:"35%", height:"35%",
        label: "鍵のかかった箱",
        isPuzzle: true },
    ],
    nav: [
      { dir: "down", target: "living", top:"85%", left:"45%" },
    ],
  },
};

const MAP_ORDER = ["entrance","living","bedroom","kitchen","storage"];
const MAP_LABELS = {
  entrance:"玄関", living:"居間", bedroom:"寝室", kitchen:"キッチン", storage:"物置部屋"
};

const SCARE_RANDOM_DEFAULT = ["images/12.png","images/13.png"];
const SCARE_RANDOM_BEDROOM = ["images/10.png"];
const PUZZLE_CODE = "4295";

// ══════════════════════════════════════════════
//  状態管理
// ══════════════════════════════════════════════
const state = {
  room: "entrance",
  visited: { entrance: true },
  foundHotspots: {},   // roomId_hotspotId -> true
  inventory: [],       // {id,name,img}
  tapCounts: {},       // roomId -> count (empty taps)
  doorUsed: false,
};

const $ = (sel) => document.querySelector(sel);
const $$ = (sel) => document.querySelectorAll(sel);

// ══════════════════════════════════════════════
//  画面遷移
// ══════════════════════════════════════════════
$("#startBtn").addEventListener("click", () => {
  $("#titleScreen").classList.remove("active");
  $("#gameScreen").classList.add("active");
  renderRoom();
});

$("#restartBtn").addEventListener("click", () => {
  location.reload();
});

// ══════════════════════════════════════════════
//  テキストボックス
// ══════════════════════════════════════════════
let textTimer = null;
function showText(msg, isEvent=false) {
  const box = $("#textBox");
  box.textContent = msg;
  box.classList.remove("hidden");
  box.classList.toggle("event", isEvent);
  clearTimeout(textTimer);
  textTimer = setTimeout(() => {
    if (!isEvent) box.classList.add("hidden");
  }, 4000);
}

// ══════════════════════════════════════════════
//  部屋描画
// ══════════════════════════════════════════════
function renderRoom() {
  const room = ROOMS[state.room];
  const img = $("#roomImg");
  if (img.src.indexOf(room.img) === -1) {
    img.classList.add("fading");
    img.src = room.img;
  }
  img.onload = () => img.classList.remove("fading");
  // 既に読み込み済み（キャッシュ）の場合に備えて即解除も試みる
  if (img.complete) img.classList.remove("fading");

  $("#roomLabel").textContent = room.name;

  // ホットスポット描画
  const hsLayer = $("#hotspotLayer");
  hsLayer.innerHTML = "";
  room.hotspots.forEach(hs => {
    const key = `${state.room}_${hs.id}`;
    const found = !!state.foundHotspots[key];
    const div = document.createElement("div");
    div.className = "hotspot" + (found && !hs.isPuzzle ? " found" : "");
    div.style.top = hs.top;
    div.style.left = hs.left;
    div.style.width = hs.width;
    div.style.height = hs.height;
    if (!found || hs.isPuzzle) {
      const hint = document.createElement("div");
      hint.className = "hint";
      hint.textContent = hs.label;
      div.appendChild(hint);
      div.addEventListener("click", (e) => {
        e.stopPropagation();
        handleHotspotTap(hs, key, found);
      });
      div.addEventListener("touchstart", () => div.classList.add("show-hint"));
      div.addEventListener("touchend", () => setTimeout(()=>div.classList.remove("show-hint"), 800));
    }
    hsLayer.appendChild(div);
  });

  // ナビ矢印描画
  const navLayer = $("#navLayer");
  navLayer.innerHTML = "";
  room.nav.forEach(n => {
    const div = document.createElement("div");
    div.className = "navArrow";
    div.style.top = n.top;
    div.style.left = n.left;
    div.textContent = arrowSymbol(n.dir);
    div.addEventListener("click", (e) => {
      e.stopPropagation();
      goToRoom(n.target);
    });
    navLayer.appendChild(div);
  });

  // 空白タップ判定用の背景クリック
  const gameScreen = $("#gameScreen");
  gameScreen.onclick = (e) => {
    if (e.target.id === "roomImg" || e.target.id === "gameScreen") {
      handleEmptyTap();
    }
  };

  renderItemBar();
  showText(room.text, false);
}

function arrowSymbol(dir) {
  return { left:"◀", right:"▶", up:"▲", down:"▼" }[dir] || "▶";
}

function goToRoom(target) {
  state.room = target;
  state.visited[target] = true;
  renderRoom();
}

// ══════════════════════════════════════════════
//  ホットスポット処理
// ══════════════════════════════════════════════
function handleHotspotTap(hs, key, found) {
  if (hs.id === "door") {
    doorAction();
    return;
  }

  if (hs.isPuzzle) {
    if (found) return; // 既に解決済み
    openPuzzle();
    return;
  }

  if (found) return;

  // 特定タップの驚かし
  if (hs.scare) {
    state.foundHotspots[key] = true;
    triggerScare(hs.scare, () => {
      renderRoom();
    });
    return;
  }

  // アイテム取得
  if (hs.item) {
    state.foundHotspots[key] = true;
    addItem(hs.item);
    renderRoom();
    return;
  }
}

// ══════════════════════════════════════════════
//  ドアアクション（玄関）
// ══════════════════════════════════════════════
function doorAction() {
  if (state.inventory.find(i => i.id === "ofuda")) {
    // 脱出！
    showEnding();
  } else {
    showText("扉は固く閉じている。\n何か特別なものが必要なようだ……", true);
    triggerShake();
  }
}

function triggerShake() {
  const wrap = $("#gameWrap");
  wrap.style.transition = "transform 0.06s";
  let count = 0;
  const interval = setInterval(() => {
    wrap.style.transform = count % 2 === 0 ? "translateX(-4px)" : "translateX(4px)";
    count++;
    if (count > 5) {
      clearInterval(interval);
      wrap.style.transform = "translateX(0)";
    }
  }, 50);
}

// ══════════════════════════════════════════════
//  空白タップ（10回でランダム驚かし）
// ══════════════════════════════════════════════
function handleEmptyTap() {
  if (state.room === "storage") return; // 物置は対象外

  const room = state.room;
  state.tapCounts[room] = (state.tapCounts[room] || 0) + 1;

  if (state.tapCounts[room] >= 10) {
    state.tapCounts[room] = 0;
    const pool = room === "bedroom" ? SCARE_RANDOM_BEDROOM : SCARE_RANDOM_DEFAULT;
    const img = pool[Math.floor(Math.random() * pool.length)];
    triggerScare(img, () => {});
  }
}

// ══════════════════════════════════════════════
//  ジャンプスケア表示
// ══════════════════════════════════════════════
function triggerScare(imgSrc, callback) {
  const overlay = $("#scareOverlay");
  const img = $("#scareImg");
  img.src = imgSrc;
  overlay.style.display = "block";
  overlay.classList.add("active");

  // バイブレーション（対応端末）
  if (navigator.vibrate) navigator.vibrate([100,50,100]);

  setTimeout(() => {
    overlay.classList.remove("active");
    overlay.style.display = "none";
    callback();
  }, 750);
}

// ══════════════════════════════════════════════
//  アイテム管理
// ══════════════════════════════════════════════
function addItem(item) {
  if (state.inventory.find(i => i.id === item.id)) return;
  state.inventory.push(item);
  showItemPopup(item);
  showText(item.text, true);
}

function showItemPopup(item) {
  const popup = $("#itemPopup");
  const card = popup.querySelector(".card");
  $("#popupImg").src = item.img;
  $("#popupName").textContent = item.name;
  card.classList.remove("out");
  popup.classList.add("active");

  setTimeout(() => {
    card.classList.add("out");
    setTimeout(() => {
      popup.classList.remove("active");
    }, 350);
  }, 2200);
}

function renderItemBar() {
  const bar = $("#itemBar");
  bar.innerHTML = "";
  state.inventory.forEach(item => {
    const slot = document.createElement("div");
    slot.className = "itemSlot";
    const img = document.createElement("img");
    img.src = item.img;
    slot.appendChild(img);
    const label = document.createElement("div");
    label.className = "label";
    label.textContent = item.name;
    slot.appendChild(label);
    bar.appendChild(slot);
  });
}

// ══════════════════════════════════════════════
//  パズル（物置の箱）
// ══════════════════════════════════════════════
const puzzleInputs = $$(".pdigit");

puzzleInputs.forEach((inp, i) => {
  inp.addEventListener("input", () => {
    inp.value = inp.value.replace(/\D/g,"").slice(0,1);
    if (inp.value && i < puzzleInputs.length - 1) {
      puzzleInputs[i+1].focus();
    }
  });
  inp.addEventListener("keydown", (e) => {
    if (e.key === "Backspace" && !inp.value && i > 0) {
      puzzleInputs[i-1].focus();
    }
  });
});

function openPuzzle() {
  $("#puzzleBox").classList.add("active");
  $("#textBox").classList.add("hidden");
  puzzleInputs.forEach(inp => inp.value = "");
  $("#puzzleErr").textContent = "";
  setTimeout(() => puzzleInputs[0].focus(), 100);
}

function closePuzzle() {
  $("#puzzleBox").classList.remove("active");
}

$("#puzzleCancel").addEventListener("click", closePuzzle);

$("#puzzleSubmit").addEventListener("click", () => {
  const code = Array.from(puzzleInputs).map(i => i.value).join("");
  if (code.length < 4) {
    $("#puzzleErr").textContent = "4桁すべて入力せよ。";
    return;
  }
  if (code === PUZZLE_CODE) {
    closePuzzle();
    const key = `storage_box`;
    state.foundHotspots[key] = true;
    addItem({ id:"ofuda", name:"お札", img:"images/08.png",
      text:"箱が開いた。中には古びたお札が一枚。\nこれを玄関の扉に使えば……" });
    renderRoom();
  } else {
    $("#puzzleErr").textContent = `「${code}」——違う。鍵は開かない。`;
    if (navigator.vibrate) navigator.vibrate(200);
  }
});

// ══════════════════════════════════════════════
//  MAP
// ══════════════════════════════════════════════
$("#mapBtn").addEventListener("click", (e) => {
  e.stopPropagation();
  renderMap();
  $("#mapPanel").classList.add("active");
});

$("#mapPanel").addEventListener("click", () => {
  $("#mapPanel").classList.remove("active");
});

function renderMap() {
  const list = $("#mapList");
  list.innerHTML = "";
  MAP_ORDER.forEach(roomId => {
    const row = document.createElement("div");
    row.className = "maprow";
    const dot = document.createElement("div");
    dot.className = "mapdot";
    if (state.room === roomId) dot.classList.add("cur");
    else if (state.visited[roomId]) dot.classList.add("vis");
    row.appendChild(dot);

    const span = document.createElement("span");
    let txt = MAP_LABELS[roomId];
    if (state.room === roomId) {
      txt += " ◀";
      span.style.color = "#b89040";
    } else if (state.visited[roomId]) {
      span.style.color = "#504020";
    } else {
      txt += " （未）";
      span.style.color = "#1e1408";
    }
    span.textContent = txt;
    row.appendChild(span);

    list.appendChild(row);
  });
}

// ══════════════════════════════════════════════
//  バッグボタン（アイテム一覧簡易表示）
// ══════════════════════════════════════════════
$("#bagBtn").addEventListener("click", (e) => {
  e.stopPropagation();
  if (state.inventory.length === 0) {
    showText("何も持っていない。", true);
  } else {
    const names = state.inventory.map(i => i.name).join("、");
    showText(`所持品：${names}`, true);
  }
});

// ══════════════════════════════════════════════
//  エンディング
// ══════════════════════════════════════════════
function showEnding() {
  $("#gameScreen").classList.remove("active");
  $("#endTitle").textContent = "— 脱出 —";
  $("#endDesc").textContent =
    "お札を扉に貼ると、重い扉がゆっくりと開いた。\n外の冷たい空気が頬を打つ。\nこの家の闇は、まだそこにある。\nあなたは走った。振り返らずに。";
  $("#endScreen").classList.add("active");
}
</script>
